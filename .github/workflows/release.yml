name: release
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    types:
      - labeled

jobs:
  release:
    if: ${{ github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Release tags must be reachable from HEAD because the bump comment uses `git tag --merged`:
      # https://github.com/haya14busa/bump/blob/9ab5412f5d96eb624c7e8559acbb11330be9901a/main.go#L72
      - name: checkout to release branch
        run: |
          git checkout -b "releases/$(cat .major-version)" "origin/releases/$(cat .major-version)"

      # Bump version on merging Pull Requests with specific labels.
      # (bump:major,bump:minor,bump:patch)
      - id: bumpr
        uses: haya14busa/action-bumpr@faf6f474bcb6174125cfc569f0b2e24cbf03d496 # v1.11.4
        with:
          dry_run: true

      - name: Set up QEMU for ARM Emulation
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          use: true

      # build the Docker Image
      - name: build the Docker Image
        if: "${{ !steps.bumpr.outputs.skip }}"
        run: |
          git checkout main
          ./.github/build.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ steps.bumpr.outputs.next_version }}

      # Create release.
      - uses: shogo82148/actions-create-release@6a396031bc74c57403da1018fec74d24c6aa03cd # v1.9.0
        if: "${{ !steps.bumpr.outputs.skip }}"
        with:
          tag_name: ${{ steps.bumpr.outputs.next_version }}
          release_name: Release ${{ steps.bumpr.outputs.next_version }}
          body: ${{ steps.bumpr.outputs.message }}
          draft: false
          prerelease: false

  release-check:
    if: "${{ github.event.action == 'labeled' }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Release tags must be reachable from HEAD because the bump comment uses `git tag --merged`:
      # https://github.com/haya14busa/bump/blob/9ab5412f5d96eb624c7e8559acbb11330be9901a/main.go#L72
      - name: checkout to release branch
        run: |
          git checkout -b "releases/$(cat .major-version)" "origin/releases/$(cat .major-version)"

      - name: Post bumpr status comment
        uses: haya14busa/action-bumpr@faf6f474bcb6174125cfc569f0b2e24cbf03d496 # v1.11.4
